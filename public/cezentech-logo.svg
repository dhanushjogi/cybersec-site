<?xml version="1.0" standalone="no"?>
<svg id="logo-svg" class="w-full max-w-[500px]" viewBox="0 0 450 100" fill="none" xmlns="http://www.w3.org/2000/svg">
                    <!-- Embed font directly into SVG for safe downloading -->
                    <defs>
                        <style>
                            @import url('https://fonts.googleapis.com/css2?family=Poppins:wght@400;700&amp;display=swap');
                        </style>
                        <mask id="gap-mask">
                            <rect width="100" height="100" fill="white"/>
                            <line x1="50" y1="0" x2="50" y2="100" stroke="black" stroke-width="4"/>
                            <line x1="6.7" y1="25" x2="93.3" y2="75" stroke="black" stroke-width="4"/>
                            <line x1="6.7" y1="75" x2="93.3" y2="25" stroke="black" stroke-width="4"/>
                        </mask>
                    </defs>

                    <!-- Geometric Logo Mark -->
                    <g transform="translate(0, 0)">
                        <g mask="url(#gap-mask)">
                            <!-- Top-Left -->
                            <polygon points="50,50 50,5 11.03,27.5" fill="#3b82f6"/>
                            <!-- Left (Highlight) -->
                            <polygon points="50,50 11.03,27.5 11.03,72.5" fill="#60a5fa"/>
                            <!-- Bottom-Left -->
                            <polygon points="50,50 11.03,72.5 50,95" fill="#3b82f6"/>
                            <!-- Bottom-Right -->
                            <polygon points="50,50 50,95 88.97,72.5" fill="#2563eb"/>
                            <!-- Top-Right -->
                            <polygon points="50,50 88.97,27.5 50,5" fill="#2563eb"/>
                        </g>
                    </g>
                    
                    <!-- Typography embedded INSIDE the SVG for perfect export -->
                    <text x="120" y="66" font-family="'Poppins', sans-serif" font-weight="700" font-size="64" letter-spacing="-0.02em">
                        <tspan fill="#60a5fa">cezen</tspan><tspan fill="#ffffff">tech</tspan>
                    </text>
                    <text id="tagline-text" x="430" y="88" font-family="'Poppins', sans-serif" font-weight="400" font-size="12" fill="#9ca3af" letter-spacing="0.25em" text-anchor="end">NETWORK TO FUTURE</text>
                </svg>