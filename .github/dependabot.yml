version: 2
updates:
  - package-ecosystem: "npm"
    directory: "/backend"
    schedule:
      interval: "weekly"
    reviewers:
      - "dhanushjogi"
    commit-message:
      prefix: "chore(deps):"
      prefix-development: "chore(deps-dev):"
    allow:
      - dependency-type: "all"
    open-pull-requests-limit: 10
    pull-request-branch-name:
      separator: "/"
